<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – ExpenseTracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e8e6e0;
    --text: #1a1917; --muted: #8a8880; --ink: #1a1917;
    --red: #c0392b; --red-light: #fdf0ee; --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }

  body::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(42,124,95,0.15) 0%, transparent 70%); top: -100px; right: -100px; pointer-events: none; }
  body::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(44,95,138,0.12) 0%, transparent 70%); bottom: -80px; left: -80px; pointer-events: none; }

  .card {
    background: var(--surface); border-radius: 20px; padding: 48px;
    width: 100%; max-width: 440px; position: relative; z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon { width: 40px; height: 40px; background: var(--ink); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
  .logo-text { font-size: 18px; font-weight: 600; }

  h2 { font-family: 'DM Serif Display', serif; font-size: 30px; font-weight: 400; margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; color: var(--ink); }
  input {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; font-family: inherit; font-size: 14px;
    background: var(--bg); color: var(--text); outline: none; transition: border 0.2s;
  }
  input:focus { border-color: var(--ink); background: #fff; }

  .error { color: var(--red); font-size: 12px; margin-top: 6px; display: none; }

  .btn { width: 100%; padding: 13px; background: var(--ink); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.15s; }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .switch { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--ink); font-weight: 500; text-decoration: underline; }

  .demo-hint {
    background: var(--bg); border: 1px dashed var(--border);
    border-radius: 9px; padding: 12px 16px;
    font-size: 12px; color: var(--muted); margin-bottom: 20px;
    line-height: 1.6;
  }
  .demo-hint strong { color: var(--text); }
  .input-wrap { position: relative; }
  .input-wrap input { padding-right: 44px; }
  .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
  .eye-btn:hover { color: var(--ink); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-text">ExpenseTracker</div>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to manage your finances</p>

  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="Enter your email address">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter your password">
      <button type="button" class="eye-btn" onclick="toggleEye()" tabindex="-1">
        <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="error" id="loginError">Invalid email or password.</div>
  </div>

  <button class="btn" onclick="handleLogin()">Sign in</button>

  <div class="switch">
    Don't have an account? <a href="register.html">Create one</a>
  </div>
</div>

<script>
  function getUsers() { return JSON.parse(localStorage.getItem('et_users') || '[]'); }

  function toggleEye() {
    const input = document.getElementById('password');
    const btn = document.querySelector('.eye-btn');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const err   = document.getElementById('loginError');
    err.style.display = 'none';

    const users = getUsers();
    const match = users.find(u => u.email === email && u.password === pass)
      || (email === 'demo@example.com' && pass === 'password123'
          ? { name: 'Demo User', email, expenses: [] }
          : null);

    if (!match) { err.style.display = 'block'; return; }

    localStorage.setItem('et_session', JSON.stringify(match));
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  if (localStorage.getItem('et_session')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
